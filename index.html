<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="l.css">
    
    <title>Login Page</title>
</head>
<body>
    <main class="container">
        <section class="right">
            <div class="logo"><i class="fa fa-leaf" aria-hidden="true"></i> Planora.</div>
            <h2 class="welcome">Welcome</h2>
            <p class="description">
                Log in to access your dashboard, manage your account,
                and continue securely with full control.
            </p>
            <label>Email Address:</label>
            <input type="email" placeholder="Enter your email" class="type">
            <label>Password:</label>
            <input type="password" placeholder="Enter your password" class="type">
            <div class="options">
                <div style="float:left;">
                    <input type="checkbox">
                    <span>Remember me</span>
                </div>
                <p style="float:right;">Forgot Password?</p>

            </div>


            <button id="loginBtn">Login</button>
            <div class="or">
                --------------- or continue with ---------------
            </div>

            <div class="social">
                <button><i class="fa fa-google" aria-hidden="true"></i></button>
                <button><i class="fa fa-facebook" aria-hidden="true"></i></button>
                <button><i class="fa fa-twitter" aria-hidden="true"></i></button>

            </div>

        </section>


    </main>
    <script src="login.js"></script>
</body>
</html>
